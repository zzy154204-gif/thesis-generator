<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  LibreOffice/fontconfig 字体别名：
  将 Windows 中文字体名称映射到 Noto Sans CJK，确保 PDF 导出中文正常渲染。
-->
<fontconfig>
  <!-- SimSun / 宋体 → Noto Serif CJK SC -->
  <alias binding="same">
    <family>SimSun</family>
    <accept><family>Noto Serif CJK SC</family></accept>
  </alias>
  <alias binding="same">
    <family>宋体</family>
    <accept><family>Noto Serif CJK SC</family></accept>
  </alias>

  <!-- SimHei / 黑体 → Noto Sans CJK SC -->
  <alias binding="same">
    <family>SimHei</family>
    <accept><family>Noto Sans CJK SC</family></accept>
  </alias>
  <alias binding="same">
    <family>黑体</family>
    <accept><family>Noto Sans CJK SC</family></accept>
  </alias>

  <!-- Microsoft YaHei / 微软雅黑 → Noto Sans CJK SC -->
  <alias binding="same">
    <family>Microsoft YaHei</family>
    <accept><family>Noto Sans CJK SC</family></accept>
  </alias>
  <alias binding="same">
    <family>微软雅黑</family>
    <accept><family>Noto Sans CJK SC</family></accept>
  </alias>

  <!-- 通用 fallback：任何字体缺 CJK 字形时回退到 Noto Sans CJK SC -->
  <alias binding="same">
    <family>sans-serif</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias binding="same">
    <family>serif</family>
    <prefer><family>Noto Serif CJK SC</family></prefer>
  </alias>
</fontconfig>
