spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
# 使用 schema.sql 建表，Hibernate 仅做实体校验不自动修改表结构
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Redis（本地开发可跳过，需安装 Redis 时改 enabled=true）----
app.redis.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=58838
spring.data.redis.password=
spring.data.redis.timeout=1000ms
# 跳过 Redis 健康检查，避免应用因 Redis 不可用而 503
management.health.redis.enabled=false

# ---- JWT ----
jwt.secret=YourJwtSecretKeyForThesisGenerator2026PleaseChangeThisInProduction
jwt.expiration=86400000

# ---- 文件上传 ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/images
app.export.dir=exports

# ---- SQL 初始化 ----
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true
