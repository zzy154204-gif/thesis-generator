# ============================================
# 论文生成系统 - 应用配置
# ============================================

spring.application.name=thesis-generator

# ---- 服务器 ----
server.port=${SERVER_PORT:8080}

# ---- PostgreSQL 数据库（通过环境变量配置，未设置则使用默认值）----
#   环境变量: DB_URL / DB_USERNAME / DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/thesis_generator}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:xht7428953}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
# 使用 schema.sql 建表，Hibernate 仅做实体校验不自动修改表结构
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Redis（通过环境变量配置，未设置则使用默认值）----
#   环境变量: REDIS_HOST / REDIS_PORT / REDIS_PASSWORD
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms

# ---- JWT ----
jwt.secret=${JWT_SECRET:YourJwtSecretKeyForThesisGenerator2026PleaseChangeThisInProduction}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ---- 文件上传 ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/images

# ---- SQL 初始化 ----
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true
