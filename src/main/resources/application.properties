# ============================================
# 论文生成系统 - 应用配置
# ============================================

spring.application.name=thesis-generator

# ---- 服务器 ----
server.port=8080

# ---- PostgreSQL 数据库 ----
spring.datasource.url=jdbc:postgresql://localhost:5432/thesis_generator
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
# 开发阶段用 update 自动建表，生产环境改为 validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=${JWT_SECRET:YourJwtSecretKeyForThesisGenerator2026PleaseChangeThisInProduction}
jwt.expiration=86400000

# ---- 文件上传 ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/images

# ---- LibreOffice（用于 DOCX 转 PDF）----
libreoffice.path=C:\\Program Files\\LibreOffice\\program\\soffice.exe
