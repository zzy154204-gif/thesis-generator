spring.application.name=thesis-generator

# ---- 服务器 ----
server.port=8080

# ---- PostgreSQL 数据库（请改为你自己的配置）----
spring.datasource.url=jdbc:postgresql://localhost:5432/thesis_generator
spring.datasource.username=postgres
