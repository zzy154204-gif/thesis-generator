# ============================================
# 论文生成系统 - 应用配置
# ============================================

spring.application.name=thesis-generator

# ---- 服务器 ----
server.port=8080

# ---- PostgreSQL 数据库（请改为你自己的配置）----
spring.datasource.url=jdbc:postgresql://localhost:5432/thesis_generator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
# 开发阶段用 update 自动建表，生产环境改为 validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Redis ----
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=3000ms

# ---- JWT ----
jwt.secret=YourJwtSecretKeyForThesisGenerator2026PleaseChangeThisInProduction
jwt.expiration=86400000

# ---- 文件上传 ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/images

# ---- SQL 初始化 ----
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
