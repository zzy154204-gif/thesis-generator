# ============================================
# 论文生成系统 - 应用配置
# ============================================

spring.application.name=thesis-generator

# ---- 服务器 ----
server.port=8080

# ---- PostgreSQL 数据库 ----
# Docker 中通过环境变量 SPRING_DATASOURCE_URL 覆盖为 jdbc:postgresql://db:5432/thesis_generator
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/thesis_generator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
# 开发阶段用 update 自动建表，生产环境改为 validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=${JWT_SECRET:YourJwtSecretKeyForThesisGenerator2026PleaseChangeThisInProduction}
jwt.expiration=86400000

# ---- 文件上传 ----
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=${APP_UPLOAD_DIR:uploads/images}

# ---- LibreOffice（用于 DOCX 转 PDF）----
# Docker 中通过环境变量覆盖为 /usr/bin/libreoffice
libreoffice.path=${LIBREOFFICE_PATH:C:\\Program Files\\LibreOffice\\program\\soffice.exe}
