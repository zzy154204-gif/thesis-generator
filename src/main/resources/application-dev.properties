# ============================================
# 开发环境配置 - 零外部依赖，开箱即用
# ============================================

# ---- H2 内存数据库（PostgreSQL 兼容模式，YEAR 非关键字）----
spring.datasource.url=jdbc:h2:mem:thesis_generator;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=YEAR
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---- 手动 SQL 建表（禁用 Hibernate DDL 避免 columnDefinition 冲突）----
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

# ---- 关闭 Redis（开发环境不需要）----
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ---- H2 控制台（可选，浏览器访问 /h2-console）----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
